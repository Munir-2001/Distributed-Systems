# Any unhandled exception in a top-level actor must behave like a crash-stop.
# Akka's default guardian strategy RESTARTS the actor with fresh state, which
# for a replica would silently resurrect it with a wiped positions[] — the
# project model is "replicas fail by crashing and do not recover".
akka.actor.guardian-supervisor-strategy = "akka.actor.StoppingSupervisorStrategy"
